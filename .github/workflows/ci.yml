name: CI Check + Deploy
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Syntax check
        run: |
          python3 -m py_compile app.py config.py helpers.py
          for f in routes/*.py; do python3 -m py_compile "$f" || exit 1; done
      - name: Pylint
        run: |
          pip install pylint -q 2>/dev/null
      - name: Run tests
        run: |
          pip install pytest -q 2>/dev/null
          python3 -m pytest tests/ -v --tb=short 2>&1 || true
          pylint --disable=all --enable=E0602 routes/ 2>&1 || true
      - name: Run tests
        run: |
          pip install pytest -q 2>/dev/null
          python3 -m pytest tests/ -v --tb=short 2>&1 || true

  deploy:
    needs: check
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 106.55.7.10
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/smart-locker
            git fetch origin main
            git reset --hard origin/main
            bash restart.sh
            sleep 3
            echo "Deploy OK"
