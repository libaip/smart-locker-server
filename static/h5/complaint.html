<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>投诉商家</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.hero{background:linear-gradient(135deg,#5BD9D0,#4ECDC4);padding:20px 18px;display:flex;align-items:center;gap:14px}
.hero-text{flex:1;color:#fff;font-size:12px;line-height:1.7}
.hero-text strong{display:block;font-size:14px;margin-bottom:4px;font-weight:600}
.hero-illust{width:70px;height:70px;flex-shrink:0}
.content{padding:12px 16px}
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px}
.form-item{margin-bottom:14px}
.form-label{font-size:13px;color:#666;margin-bottom:6px}
.form-input{width:100%;border:1px solid #E8E8E8;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;font-family:inherit}
.form-input:focus{border-color:#4ECDC4}
.form-select{width:100%;border:1px solid #E8E8E8;border-radius:8px;padding:10px 12px;font-size:14px;outline:none;background:#fff}
textarea.form-input{min-height:90px;resize:none}
.char-count{font-size:11px;color:#999;text-align:right;margin-top:4px}
.submit-btn{display:block;width:100%;background:linear-gradient(135deg,#FAD36D,#F0B429);color:#fff;font-size:15px;font-weight:600;padding:13px;border-radius:24px;border:none;cursor:pointer;margin-top:16px}
.submit-btn:disabled{opacity:.6;cursor:not-allowed}
.success-msg{text-align:center;padding:60px 20px;display:none}
.success-msg svg{width:80px;height:80px;margin-bottom:16px}
.success-msg .msg-title{font-size:18px;font-weight:600;color:#333;margin-bottom:8px}
.success-msg .msg-desc{font-size:14px;color:#999;margin-bottom:24px}
.back-btn{display:inline-block;padding:10px 40px;background:#4ECDC4;color:#fff;border-radius:24px;border:none;font-size:15px;cursor:pointer;text-decoration:none}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" id="linkBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">投诉商家</div>
</div>
<div id="formArea">
  <div class="hero">
    <div class="hero-text"><strong>非常抱歉给您带来不便</strong>我们重视每一位用户体验，请填写信息帮助我们明确问题。</div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">投诉人信息</div>
      <div class="form-item"><div class="form-label">联系电话</div><input class="form-input" type="tel" id="inputPhone" placeholder="请输入联系电话" maxlength="11"></div>
    </div>
    <div class="card">
      <div class="card-title">投诉内容</div>
      <div class="form-item"><div class="form-label">扣费订单号</div><select class="form-select" id="selectOrder"><option value="">请选择</option></select></div>
      <div class="form-item"><div class="form-label">投诉描述</div><textarea class="form-input" id="inputContent" placeholder="请输入投诉内容" maxlength="140" oninput="updateCount(this)"></textarea><div class="char-count"><span id="char-num">0</span>/140</div></div>
    </div>
    <button class="submit-btn" id="btnSubmit">提交</button>
  </div>
</div>
<div class="success-msg" id="successArea">
  <svg viewBox="0 0 80 80" fill="none"><circle cx="40" cy="40" r="36" fill="#E8F8F7"/><path d="M25 42l10 10 20-22" stroke="#4ECDC4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <div class="msg-title">投诉已提交</div>
  <div class="msg-desc">我们会尽快处理您的投诉</div>
  <a class="back-btn" id="linkBackOk">返回</a>
</div>
<script>
function getPhone(){
  var params=new URLSearchParams(window.location.search);
  var p=params.get('phone')||localStorage.getItem('phone')||'';
  var openid=params.get('openid')||localStorage.getItem('openid')||'';
  if(openid) localStorage.setItem('openid',openid);
  if(p){localStorage.setItem('phone',p);return p;}
  // If no phone but have openid, try to get phone from backend
  if(openid && !p){
    fetch("https://locker.cqdyxl.com/api/user/balance?openid="+encodeURIComponent(openid))
      .then(function(r){return r.json();})
      .then(function(d){
        var phone=(d.data||{}).phone||'';
        if(phone){localStorage.setItem('phone',phone);location.reload();}
      }).catch(function(){});
  }
  return p;
}
function maskPhone(phone){
  if(!phone||phone.length<7) return phone||'未登录';
  return phone.substring(0,3)+'****'+phone.substring(phone.length-4);
}
function apiGet(url){
  var phone=getPhone();
  var sep=url.indexOf('?')>-1?'&':'?';
  return fetch(url+sep+'phone='+encodeURIComponent(phone))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===0||d.code===200) return d.data;
      throw new Error(d.message||'请求失败');
    });
}
function apiPost(url,body){
  var phone=getPhone();
  body.phone=phone;
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.code===0||d.code===200) return d.data;
    throw new Error(d.message||'请求失败');
  });
}
function withPhone(href){
  var phone=getPhone();
  if(!phone) return href;
  var sep=href.indexOf('?')>-1?'&':'?';
  return href+sep+'phone='+encodeURIComponent(phone);
}
var API_BASE='https://locker.cqdyxl.com/api';

function updateCount(el){document.getElementById('char-num').textContent=el.value.length;}
(function(){
  var phone=getPhone();
  document.getElementById('linkBack').href=withPhone('index.html');
  document.getElementById('linkBackOk').href=withPhone('index.html');
  document.getElementById('inputPhone').value=phone;
  apiGet(API_BASE+'/user/orders').then(function(orders){
    var sel=document.getElementById('selectOrder');
    (orders||[]).forEach(function(o){
      if(parseInt(o.status)===3){var opt=document.createElement('option');opt.value=o.order_no;opt.textContent=o.order_no+' ('+(o.cabinet_name||'')+')';sel.appendChild(opt);}
    });
  }).catch(function(){});
  document.getElementById('btnSubmit').addEventListener('click',function(){
    var btn=this,content=document.getElementById('inputContent').value.trim(),orderNo=document.getElementById('selectOrder').value;
    if(!content){alert('请填写投诉描述');return;}
    btn.disabled=true;btn.textContent='提交中...';
    apiPost(API_BASE+'/complaints',{phone:phone||document.getElementById('inputPhone').value,content:content,order_no:orderNo,type:'self'}).then(function(){
      document.getElementById('formArea').style.display='none';
      document.getElementById('successArea').style.display='block';
    }).catch(function(e){alert(e.message||'提交失败');btn.disabled=false;btn.textContent='提交';});
  });
})();
</script>
</body>
</html>
