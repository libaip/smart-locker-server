<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>客服中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.content{padding:16px}
.title-card{background:#fff;border-radius:12px;padding:20px;text-align:center;margin-bottom:16px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.company-name{font-size:17px;font-weight:600;margin-bottom:16px}
.info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5}
.info-row:last-child{border-bottom:none}
.info-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:10px;flex-shrink:0}
.info-icon svg{width:18px;height:18px}
.info-label{font-size:11px;color:#999}
.info-value{font-size:14px;font-weight:500;margin-top:1px}
.actions{display:flex;gap:12px;margin-top:20px}
.action-btn{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;border:none;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;color:#fff}
.btn-complaint{background:linear-gradient(135deg,#FFB347,#F0A030)}
.btn-call{background:linear-gradient(135deg,#5BD9D0,#4ECDC4)}
.action-btn svg{width:18px;height:18px;fill:#fff}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" id="linkBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">客服中心</div>
</div>
<div class="content">
  <div class="title-card">
    <div class="company-name">重庆科莱维科技有限公司</div>
    <div class="info-row"><div class="info-icon" style="background:#E8F8F7"><svg viewBox="0 0 24 24" fill="#4ECDC4"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg></div><div><div class="info-label">微信客服</div><div class="info-value">Kelaiwei_KeFu</div></div></div>
    <div class="info-row"><div class="info-icon" style="background:#E3F2FD"><svg viewBox="0 0 24 24" fill="#2196F3"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg></div><div><div class="info-label">客服电话</div><div class="info-value">400-123-4567</div></div></div>
    <div class="info-row"><div class="info-icon" style="background:#FFF3E0"><svg viewBox="0 0 24 24" fill="#F0A030"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm1 11h-2V7h2v6zm0 2h-2v-2h2v2z"/></svg></div><div><div class="info-label">营业时间</div><div class="info-value">08:30 - 21:00</div></div></div>
    <div class="actions">
      <a class="action-btn btn-complaint" id="linkComplaint"><svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>一键投诉</a>
      <a class="action-btn btn-call" href="tel:4001234567"><svg viewBox="0 0 24 24"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.5.6 3.6.1.3 0 .7-.2 1l-2.3 2.2z"/></svg>一键拨打</a>
    </div>
  </div>
</div>
<script>
function getPhone(){
  var params=new URLSearchParams(window.location.search);
  var p=params.get('phone')||localStorage.getItem('phone')||'';
  var openid=params.get('openid')||localStorage.getItem('openid')||'';
  if(openid) localStorage.setItem('openid',openid);
  if(p){localStorage.setItem('phone',p);return p;}
  // If no phone but have openid, try to get phone from backend
  if(openid && !p){
    fetch("https://locker.cqdyxl.com/api/user/balance?openid="+encodeURIComponent(openid))
      .then(function(r){return r.json();})
      .then(function(d){
        var phone=(d.data||{}).phone||'';
        if(phone){localStorage.setItem('phone',phone);location.reload();}
      }).catch(function(){});
  }
  return p;
}
function withPhone(h){var p=getPhone();if(!p)return h;return h+(h.indexOf('?')>-1?'&':'?')+'phone='+encodeURIComponent(p);}
(function(){getPhone();document.getElementById('linkBack').href=withPhone('index.html');document.getElementById('linkComplaint').href=withPhone('complaint.html');})();
</script>
</body>
</html>
