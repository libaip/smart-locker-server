<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>我的订单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.nav-right{margin-left:auto;display:flex}
.nav-right svg{width:20px;height:20px;fill:#999}
.tabs{display:flex;background:#fff;border-bottom:1px solid #f0f0f0}
.tab{flex:1;text-align:center;padding:12px 0;font-size:14px;color:#999;cursor:pointer;position:relative}
.tab.active{color:#4ECDC4;font-weight:600}
.tab.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:2px;background:#4ECDC4;border-radius:1px}
.content{padding:0}
/* 空状态 */
.empty{text-align:center;padding:80px 20px}
.empty-icon svg{width:140px;height:140px}
.empty-text{font-size:13px;color:#ccc;margin-top:16px}
/* 订单卡片 */
.order-card{background:#fff;border-radius:12px;margin:12px 16px;padding:16px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.order-cabinet{font-size:15px;font-weight:600}
.order-status{font-size:11px;color:#4ECDC4;background:#E8F8F7;padding:3px 10px;border-radius:10px}
.order-row{font-size:13px;color:#666;line-height:2.2}
.order-row .label{color:#999;margin-right:4px}
.order-row .copy{font-size:10px;color:#4ECDC4;cursor:pointer;border:1px solid #4ECDC4;border-radius:3px;padding:0 3px;margin-left:4px;vertical-align:middle}
.bottom-links{display:flex;justify-content:center;gap:24px;padding:20px 0;font-size:13px}
.bottom-links a{color:#999;text-decoration:underline}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" href="index.html"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">我的订单</div>
  <div class="nav-right"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab(this,'ongoing')">进行中</div>
  <div class="tab" onclick="switchTab(this,'done')">已完成</div>
</div>
<div class="content">
  <div class="tab-content active" id="ongoing">
    <div class="empty">
      <div class="empty-icon">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <!-- 箱子 -->
          <rect x="55" y="90" width="90" height="70" rx="6" fill="#E8E8E8" stroke="#D0D0D0" stroke-width="1"/>
          <rect x="60" y="82" width="80" height="12" rx="4" fill="#D8D8D8"/>
          <line x1="100" y1="82" x2="100" y2="94" stroke="#C0C0C0" stroke-width="1"/>
          <!-- 纸飞机 -->
          <path d="M105 65 L140 40 L148 48 L115 72 Z" fill="#4ECDC4" opacity="0.7"/>
          <path d="M105 65 L115 72 L112 60 Z" fill="#3BA99C" opacity="0.7"/>
          <!-- 飞行轨迹 -->
          <circle cx="152" cy="35" r="2.5" fill="#4ECDC4" opacity="0.5"/>
          <circle cx="158" cy="30" r="2" fill="#4ECDC4" opacity="0.35"/>
          <circle cx="163" cy="26" r="1.5" fill="#4ECDC4" opacity="0.2"/>
        </svg>
      </div>
      <div class="empty-text">- 暂无更多订单信息 -</div>
    </div>
  </div>
  <div class="tab-content" id="done">
    <div class="order-card">
      <div class="order-header">
        <span class="order-cabinet">043号柜</span>
        <span class="order-status">使用完成</span>
      </div>
      <div class="order-row">
        <div><span class="label">订单编号:</span> ORD20260706001 <span class="copy">复制</span></div>
        <div><span class="label">下单时间:</span> 2026-07-06 10:30</div>
        <div><span class="label">下单地点:</span> 重庆北站A区</div>
      </div>
    </div>
    <div class="order-card">
      <div class="order-header">
        <span class="order-cabinet">012号柜</span>
        <span class="order-status">使用完成</span>
      </div>
      <div class="order-row">
        <div><span class="label">订单编号:</span> ORD20260705002 <span class="copy">复制</span></div>
        <div><span class="label">下单时间:</span> 2026-07-05 14:20</div>
        <div><span class="label">下单地点:</span> 沙坪坝火车站B区</div>
      </div>
    </div>
    <div class="bottom-links">
      <a href="#">找不到订单？</a>
      <a href="#">还有包未取？</a>
    </div>
  </div>
</div>
<script>
function switchTab(el,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.querySelectorAll('.copy').forEach(btn=>{
  btn.addEventListener('click',function(){
    var row=this.parentElement;
    var text=row.textContent.replace('复制','').replace('订单编号:','').trim();
    navigator.clipboard?navigator.clipboard.writeText(text):0;
    this.textContent='已复制';var b=this;setTimeout(()=>{b.textContent='复制'},1500);
  });
});
</script>
</body>
</html>
