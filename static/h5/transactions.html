<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>交易明细</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.content{padding:16px}
.tx-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;position:relative}
.tx-row{display:flex;align-items:center;margin-bottom:8px;line-height:1.6}
.tx-row:last-child{margin-bottom:0}
.tx-label{font-size:14px;color:#999;min-width:72px;flex-shrink:0}
.tx-value{font-size:14px;color:#333;flex:1;display:flex;align-items:center;gap:4px}
.tx-tip{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;color:#E6A700;text-align:right;max-width:120px;line-height:1.4}
.empty,.loading{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" id="linkBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">交易明细</div>
</div>
<div class="content" id="txList"><div class="loading">加载中...</div></div>
<script>
function getPhone(){
  var params=new URLSearchParams(window.location.search);
  var p=params.get('phone')||localStorage.getItem('phone')||'';
  var openid=params.get('openid')||localStorage.getItem('openid')||'';
  if(openid) localStorage.setItem('openid',openid);
  if(p){localStorage.setItem('phone',p);return p;}
  // If no phone but have openid, try to get phone from backend
  if(openid && !p){
    fetch("https://locker.cqdyxl.com/api/user/balance?openid="+encodeURIComponent(openid))
      .then(function(r){return r.json();})
      .then(function(d){
        var phone=(d.data||{}).phone||'';
        if(phone){localStorage.setItem('phone',phone);location.reload();}
      }).catch(function(){});
  }
  return p;
}
function maskPhone(phone){
  if(!phone||phone.length<7) return phone||'未登录';
  return phone.substring(0,3)+'****'+phone.substring(phone.length-4);
}
function apiGet(url){
  var phone=getPhone();
  var sep=url.indexOf('?')>-1?'&':'?';
  return fetch(url+sep+'phone='+encodeURIComponent(phone))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===0||d.code===200) return d.data;
      throw new Error(d.message||'请求失败');
    });
}
function apiPost(url,body){
  var phone=getPhone();
  body.phone=phone;
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.code===0||d.code===200) return d.data;
    throw new Error(d.message||'请求失败');
  });
}
function withPhone(href){
  var phone=getPhone();
  if(!phone) return href;
  var sep=href.indexOf('?')>-1?'&':'?';
  return href+sep+'phone='+encodeURIComponent(phone);
}
var API_BASE='https://locker.cqdyxl.com/api';

function fmtTime(t){if(!t)return '';return String(t).replace('T',' ').substring(0,19);}
(function(){
  document.getElementById('linkBack').href=withPhone('wallet.html');
  apiGet(API_BASE+'/user/wallet/transactions?type=all&page=1&limit=50').then(function(data){
    var list=data.list||[],c=document.getElementById('txList');
    if(!list.length){c.innerHTML='<div class="empty">暂无交易记录</div>';return;}
    var h='';
    list.forEach(function(item){
      var amt=parseFloat(item.amount||0),exp=amt<0,abs=Math.abs(amt).toFixed(2),tip='';
      if(exp) tip='<div class="tx-tip">预计1-3个工作日到账<br>请耐心等待…<br>超时请联系客服</div>';
      h+='<div class="tx-card">'+tip
        +'<div class="tx-row"><div class="tx-label">订单编号:</div><div class="tx-value">'+(item.order_no||'')+'</div></div>'
        +'<div class="tx-row"><div class="tx-label">交易类型:</div><div class="tx-value">'+(exp?'余额提现':'退回钱包')+'</div></div>'
        +'<div class="tx-row"><div class="tx-label">交易金额:</div><div class="tx-value">'+abs+'元</div></div>'
        +'<div class="tx-row"><div class="tx-label">交易时间:</div><div class="tx-value">'+fmtTime(item.source_time)+'</div></div>'
        +'</div>';
    });
    c.innerHTML=h;
  }).catch(function(e){document.getElementById('txList').innerHTML='<div class="empty">加载失败</div>';});
})();
</script>
</body>
</html>
