<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>提现进度</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{font-size:18px;cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.nav-right{margin-left:auto;display:flex;gap:4px}
.nav-right svg{width:20px;height:20px;fill:#999}
.clock{text-align:center;padding:24px 0 16px}
.clock svg{width:56px;height:56px}
.card{background:#fff;border-radius:12px;margin:0 16px;padding:24px 20px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.amount{text-align:center;font-size:28px;font-weight:bold;margin-bottom:16px}

/* progress bar animation */
.progress-bar{height:6px;background:#E8E8E8;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#4ECDC4,#5BD9D0);border-radius:3px;animation:fillBar 1.5s ease-out 0.3s forwards}
@keyframes fillBar{
  0%{width:0}
  100%{width:66%}
}

/* timeline */
.timeline{padding-left:8px}
.step{display:flex;align-items:flex-start;margin-bottom:18px;position:relative;opacity:0;transform:translateY(8px)}
.step:last-child{margin-bottom:0}
.step.visible{opacity:1;transform:translateY(0);transition:all .4s ease}
.step-dot{width:12px;height:12px;border-radius:50%;margin-right:12px;flex-shrink:0;margin-top:2px}
.step-dot.done{background:#4ECDC4}
.step-dot.current{background:#4ECDC4;animation:pulse 1.5s ease-in-out infinite}
.step-dot.pending{background:#E0E0E0}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(78,205,196,0.5)}
  50%{box-shadow:0 0 0 8px rgba(78,205,196,0)}
}
.step-line{position:absolute;left:5px;top:14px;width:2px;height:calc(100% + 6px);background:#E8E8E8}
.step:last-child .step-line{display:none}
.step.done .step-line{background:#4ECDC4}
.step-info{flex:1}
.step-title{font-size:14px;font-weight:500}
.step-desc{font-size:12px;color:#999;margin-top:2px;display:flex;align-items:center;gap:4px}

/* loading spinner inline */
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(78,205,196,0.3);border-top-color:#4ECDC4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* animated dots for processing text */
.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{
  0%{content:''}
  25%{content:'.'}
  50%{content:'..'}
  75%{content:'...'}
}

.details{margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.detail-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px}
.detail-label{color:#999}
.detail-value{color:#333}
.submit-btn{display:block;width:calc(100% - 32px);margin:24px 16px 0;background:transparent;color:#666;font-size:14px;padding:10px;border-radius:24px;border:none;cursor:pointer;text-align:center;text-decoration:none}
.confirm-btn{display:block;width:calc(100% - 32px);margin:16px 16px 32px;background:linear-gradient(135deg,#4ECDC4,#3DB8B0);color:#fff;font-size:16px;font-weight:600;padding:14px;border-radius:24px;border:none;cursor:pointer;text-align:center;text-decoration:none}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" href="wallet.html"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">提现进度</div>
  <div class="nav-right"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></div>
</div>
<div class="clock">
  <svg viewBox="0 0 56 56" fill="none">
    <circle cx="28" cy="28" r="24" stroke="#4ECDC4" stroke-width="3" fill="#E8F8F7"/>
    <path d="M28 16v14l8 6" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M22 38l-4 4M34 38l4 4" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
  </svg>
</div>
<div class="card">
  <div class="amount">¥ 20</div>
  <div class="progress-bar"><div class="progress-fill"></div></div>
  <div class="timeline">
    <div class="step done" id="step1">
      <div class="step-dot done"></div>
      <div class="step-line"></div>
      <div class="step-info">
        <div class="step-title">申请提现</div>
        <div class="step-desc">已提交 · 2026-07-07 12:44</div>
      </div>
    </div>
    <div class="step" id="step2">
      <div class="step-dot current"></div>
      <div class="step-line"></div>
      <div class="step-info">
        <div class="step-title">微信处理中</div>
        <div class="step-desc"><span class="spinner"></span> <span class="loading-dots">处理中</span></div>
      </div>
    </div>
    <div class="step" id="step3">
      <div class="step-dot pending"></div>
      <div class="step-info">
        <div class="step-title">提现成功</div>
        <div class="step-desc">待到账</div>
      </div>
    </div>
  </div>
  <div class="details">
    <div class="detail-row">
      <span class="detail-label">提现时间</span>
      <span class="detail-value">2026-07-07 12:44:00</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">手机尾号</span>
      <span class="detail-value">1669</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">退回目的地</span>
      <span class="detail-value">微信零钱</span>
    </div>
  </div>
</div>
<a class="submit-btn" href="withdraw_record.html">查看提现记录</a>
<a class="confirm-btn" href="wallet.html">确认</a>

<script>
// 动态依次显示时间轴步骤
var steps = document.querySelectorAll('.step');
steps.forEach(function(step, i){
  setTimeout(function(){ step.classList.add('visible'); }, 400 + i * 500);
});
</script>
</body>
</html>
