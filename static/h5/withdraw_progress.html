<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>提现进度</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.clock{text-align:center;padding:24px 0 16px}
.clock svg{width:56px;height:56px}
.card{background:#fff;border-radius:12px;margin:0 16px;padding:24px 20px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.amount{text-align:center;font-size:28px;font-weight:bold;margin-bottom:16px}
.progress-bar{height:6px;background:#E8E8E8;border-radius:3px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;width:0;background:linear-gradient(90deg,#4ECDC4,#5BD9D0);border-radius:3px;animation:fillBar 1.5s ease-out 0.3s forwards}
@keyframes fillBar{0%{width:0}100%{width:66%}}
.timeline{padding-left:8px}
.step{display:flex;align-items:flex-start;margin-bottom:18px;position:relative;opacity:0;transform:translateY(8px)}
.step:last-child{margin-bottom:0}
.step.visible{opacity:1;transform:translateY(0);transition:all .4s ease}
.step-dot{width:12px;height:12px;border-radius:50%;margin-right:12px;flex-shrink:0;margin-top:2px}
.step-dot.done{background:#4ECDC4}
.step-dot.current{background:#4ECDC4;animation:pulse 1.5s ease-in-out infinite}
.step-dot.pending{background:#E0E0E0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(78,205,196,0.5)}50%{box-shadow:0 0 0 8px rgba(78,205,196,0)}}
.step-line{position:absolute;left:5px;top:14px;width:2px;height:calc(100% + 6px);background:#E8E8E8}
.step:last-child .step-line{display:none}
.step.done .step-line{background:#4ECDC4}
.step-info{flex:1}
.step-title{font-size:14px;font-weight:500}
.step-desc{font-size:12px;color:#999;margin-top:2px;display:flex;align-items:center;gap:4px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(78,205,196,0.3);border-top-color:#4ECDC4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.details{margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.detail-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px}
.detail-label{color:#999}
.detail-value{color:#333}
.submit-btn{display:block;width:calc(100% - 32px);margin:24px 16px 0;background:transparent;color:#666;font-size:14px;padding:10px;border-radius:24px;border:none;cursor:pointer;text-align:center;text-decoration:none}
.confirm-btn{display:block;width:calc(100% - 32px);margin:16px 16px 32px;background:linear-gradient(135deg,#4ECDC4,#3DB8B0);color:#fff;font-size:16px;font-weight:600;padding:14px;border-radius:24px;border:none;cursor:pointer;text-align:center;text-decoration:none}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" id="linkBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">提现进度</div>
</div>
<div class="clock"><svg viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="24" stroke="#4ECDC4" stroke-width="3" fill="#E8F8F7"/><path d="M28 16v14l8 6" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 38l-4 4M34 38l4 4" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/></svg></div>
<div class="card">
  <div class="amount" id="wdAmount">¥ --</div>
    <div class="step done visible"><div class="step-dot done"></div><div class="step-line"></div><div class="step-info"><div class="step-title">申请提现</div><div class="step-desc">已将退款申请提交至微信</div></div></div>
    <div class="step visible"><div class="step-dot current"></div><div class="step-line"></div><div class="step-info"><div class="step-title">微信处理中</div><div class="step-desc"><span class="spinner"></span> <span class="loading-dots">微信将退款原路退回支付账户</span></div></div></div>
    <div class="step visible"><div class="step-dot pending"></div><div class="step-info"><div class="step-title">提现成功</div><div class="step-desc">预计1-3个工作日内到账<br>请耐心等待，超时请联系客服</div></div></div>
  </div>
  <div class="details">
    <div class="detail-row"><span class="detail-label">提现时间:</span><span class="detail-value" id="wdTime">--</span></div>
    <div class="detail-row"><span class="detail-label">手机号:</span><span class="detail-value" id="wdPhone">--</span></div>
    <div class="detail-row"><span class="detail-label">退款至:</span><span class="detail-value">退回原支付账户</span></div>
  </div>
</div>
<a class="submit-btn" id="linkRecord">查看提现记录</a>
<a class="confirm-btn" id="linkConfirm">确认</a>
<script>
function getPhone(){
  var params=new URLSearchParams(window.location.search);
  var p=params.get('phone')||localStorage.getItem('phone')||'';
  var openid=params.get('openid')||localStorage.getItem('openid')||'';
  if(openid) localStorage.setItem('openid',openid);
  if(p){localStorage.setItem('phone',p);return p;}
  // If no phone but have openid, try to get phone from backend
  if(openid && !p){
    fetch("https://locker.cqdyxl.com/api/user/balance?openid="+encodeURIComponent(openid))
      .then(function(r){return r.json();})
      .then(function(d){
        var phone=(d.data||{}).phone||'';
        if(phone){localStorage.setItem('phone',phone);location.reload();}
      }).catch(function(){});
  }
  return p;
}
function maskPhone(phone){
  if(!phone||phone.length<7) return phone||'未登录';
  return phone.substring(0,3)+'****'+phone.substring(phone.length-4);
}
function apiGet(url){
  var phone=getPhone();
  var sep=url.indexOf('?')>-1?'&':'?';
  return fetch(url+sep+'phone='+encodeURIComponent(phone))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===0||d.code===200) return d.data;
      throw new Error(d.message||'请求失败');
    });
}
function apiPost(url,body){
  var phone=getPhone();
  body.phone=phone;
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.code===0||d.code===200) return d.data;
    throw new Error(d.message||'请求失败');
  });
}
function withPhone(href){
  var phone=getPhone();
  if(!phone) return href;
  var sep=href.indexOf('?')>-1?'&':'?';
  return href+sep+'phone='+encodeURIComponent(phone);
}
var API_BASE='https://locker.cqdyxl.com/api';

(function(){
  var phone=getPhone();
  document.getElementById('linkBack').href=withPhone('wallet.html');
  document.getElementById('linkRecord').href=withPhone('withdraw_record.html');
  document.getElementById('linkConfirm').href=withPhone('wallet.html');
  var params=new URLSearchParams(window.location.search);
  var amt=params.get("amount");
  if(amt){document.getElementById("wdAmount").textContent="¥ "+parseFloat(amt).toFixed(2);}
  else{
    fetch(API_BASE+'/user/wallet/withdrawals?phone='+encodeURIComponent(phone))
      .then(function(r){return r.json();})
      .then(function(d){
        var list=d.data||[];
        if(list.length>0){
          var latest=list[0];
          var totalAmt=parseFloat(latest.amount||0);
          var latestTime=latest.apply_time||"";
          for(var i=1;i<list.length;i++){
            var item=list[i];
            if(item.apply_time&&item.apply_time===latestTime){
              totalAmt+=parseFloat(item.amount||0);
            }else{
              break;
            }
          }
          document.getElementById("wdAmount").textContent="¥ "+totalAmt.toFixed(2);
          if(latest.apply_time){
            var t=String(latest.apply_time).replace("T"," ").substring(0,19);
            document.getElementById("wdTime").textContent=t;
          }
        }
      }).catch(function(){});
  }
  document.getElementById('wdPhone').textContent=maskPhone(phone);
  var now=new Date();
  document.getElementById('wdTime').textContent=now.getFullYear()+'-'+('0'+(now.getMonth()+1)).slice(-2)+'-'+('0'+now.getDate()).slice(-2)+' '+('0'+now.getHours()).slice(-2)+':'+('0'+now.getMinutes()).slice(-2)+':'+('0'+now.getSeconds()).slice(-2);
})();
</script>
</body>
</html>
