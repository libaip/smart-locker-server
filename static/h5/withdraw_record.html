<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>提现记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.nav-right{margin-left:auto;display:flex}
.nav-right svg{width:20px;height:20px;fill:#999}
.content{padding:12px 16px}
.record-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04);position:relative}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.record-order{font-size:12px;color:#666;display:flex;align-items:center;gap:4px}
.record-copy{font-size:10px;color:#4ECDC4;cursor:pointer;border:1px solid #4ECDC4;border-radius:3px;padding:0 4px}
.record-amount{font-size:20px;font-weight:bold;color:#4ECDC4}
.record-amount small{font-size:12px;font-weight:normal;color:#999;display:block}
.record-bottom{display:flex;align-items:center;gap:8px}
.record-time{font-size:12px;color:#999;flex:1}
.status-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.status-refund{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;background:#E8F8F7;color:#4ECDC4;font-weight:500}
.status-refund::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ECDC4}
.status-done{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;background:#f0f0f0;color:#888}
.status-done svg{width:14px;height:14px;fill:#888}
.tips{background:#FFF8E1;border-radius:6px;padding:8px 12px;font-size:11px;color:#E6A700;line-height:1.5;margin-top:10px}
.faq{text-align:center;padding:12px 0 30px}
.faq a{font-size:13px;color:#999;text-decoration:underline}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" href="wallet.html"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">提现记录</div>
  <div class="nav-right"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></div>
</div>
<div class="content">

  <!-- 记录1: 退款成功 但未到账 -->
  <div class="record-card">
    <div class="record-top">
      <div class="record-order">订单号: 123456789 <span class="record-copy" onclick="copyText('123456789',this)">复制</span></div>
      <div class="record-amount">+20元<small>手续费0.00元</small></div>
    </div>
    <div class="record-bottom">
      <div class="record-time">提现时间: 2026/07/07 12:44</div>
    </div>
    <div class="status-row">
      <span class="status-refund">退款成功</span>
    </div>
    <div class="tips">⚠ 预计1-3个工作日到账 请耐心等待…<br>超时请联系客服</div>
  </div>

  <!-- 记录2: 退款成功 且已到账 -->
  <div class="record-card">
    <div class="record-top">
      <div class="record-order">订单号: 987654321 <span class="record-copy" onclick="copyText('987654321',this)">复制</span></div>
      <div class="record-amount">+20元<small>手续费0.00元</small></div>
    </div>
    <div class="record-bottom">
      <div class="record-time">提现时间: 2026/07/06 09:30</div>
    </div>
    <div class="status-row">
      <span class="status-refund">退款成功</span>
      <span class="status-done"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>已到账</span>
    </div>
  </div>

  <div class="faq"><a href="#">提现常见问题</a></div>
</div>
<script>
function copyText(text,el){
  navigator.clipboard?navigator.clipboard.writeText(text):0;
  el.textContent='已复制';setTimeout(()=>{el.textContent='复制'},1500);
}
</script>
</body>
</html>
