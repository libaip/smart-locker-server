<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>提现记录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.content{padding:12px 16px}
.record-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.record-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.record-amount{font-size:20px;font-weight:bold;color:#4ECDC4}
.record-amount small{font-size:12px;font-weight:normal;color:#999;display:block}
.record-time{font-size:12px;color:#999;flex:1}
.status-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.status-refund{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;background:#E8F8F7;color:#4ECDC4;font-weight:500}
.status-refund::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#4ECDC4}
.status-done{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:12px;background:#f0f0f0;color:#888}
.status-done svg{width:14px;height:14px;fill:#888}
.tips{border-radius:6px;padding:8px 12px;font-size:11px;color:#D4A843;line-height:1.5;margin-top:10px}
.empty,.loading{text-align:center;padding:60px 20px;color:#ccc;font-size:14px}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back" id="linkBack"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">提现记录</div>
</div>
<div class="content" id="recordList"><div class="loading">加载中...</div></div>
<script>
function getPhone(){
  var params=new URLSearchParams(window.location.search);
  var p=params.get('phone')||localStorage.getItem('phone')||'';
  var openid=params.get('openid')||localStorage.getItem('openid')||'';
  if(openid) localStorage.setItem('openid',openid);
  if(p){localStorage.setItem('phone',p);return p;}
  // If no phone but have openid, try to get phone from backend
  if(openid && !p){
    fetch("https://locker.cqdyxl.com/api/user/balance?openid="+encodeURIComponent(openid))
      .then(function(r){return r.json();})
      .then(function(d){
        var phone=(d.data||{}).phone||'';
        if(phone){localStorage.setItem('phone',phone);location.reload();}
      }).catch(function(){});
  }
  return p;
}
function maskPhone(phone){
  if(!phone||phone.length<7) return phone||'未登录';
  return phone.substring(0,3)+'****'+phone.substring(phone.length-4);
}
function apiGet(url){
  var phone=getPhone();
  var sep=url.indexOf('?')>-1?'&':'?';
  return fetch(url+sep+'phone='+encodeURIComponent(phone))
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.code===0||d.code===200) return d.data;
      throw new Error(d.message||'请求失败');
    });
}
function apiPost(url,body){
  var phone=getPhone();
  body.phone=phone;
  return fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  }).then(function(r){return r.json();})
  .then(function(d){
    if(d.code===0||d.code===200) return d.data;
    throw new Error(d.message||'请求失败');
  });
}
function withPhone(href){
  var phone=getPhone();
  if(!phone) return href;
  var sep=href.indexOf('?')>-1?'&':'?';
  return href+sep+'phone='+encodeURIComponent(phone);
}
var API_BASE='https://locker.cqdyxl.com/api';

function fmtTime(t){if(!t)return '';return String(t).replace('T',' ').substring(0,16).replace(/-/g,'/');}
(function(){
  document.getElementById('linkBack').href=withPhone('wallet.html');
  apiGet(API_BASE+'/user/wallet/withdrawals').then(function(data){
    var list=data||[],c=document.getElementById('recordList');
    if(!list.length){c.innerHTML='<div class="empty">暂无提现记录</div>';return;}
    var h='';
    list.forEach(function(item){
      var amt=parseFloat(item.amount||0).toFixed(2);
      var isOk=parseInt(item.status)===2;
      var hasApprove=item.approve_time?true:false;
      var st='<span class="status-refund">退款成功</span>';
      if(isOk&&hasApprove) st+='<span class="status-done"><svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>已到账</span>';
      var tip='';
      if(!isOk) tip='<div class="tips">预计1-3个工作日到账 请耐心等待…<br>超时请联系客服</div>';
      h+='<div class="record-card"><div class="record-top"><div class="record-amount">+'+amt+'元<small>手续费0.00元</small></div></div>'
        +'<div class="record-time">提现时间: '+fmtTime(item.apply_time)+'</div>'
        +'<div class="status-row">'+st+'</div>'+tip+'</div>';
    });
    c.innerHTML=h;
  }).catch(function(e){document.getElementById('recordList').innerHTML='<div class="empty">加载失败</div>';});
})();
</script>
</body>
</html>
