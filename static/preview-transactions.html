<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=375,initial-scale=1,maximum-scale=1">
<title>小程序 - 交易明细 预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:375px;min-height:812px;background:#f5f6fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative;}
.nav .arrow{font-size:22px;color:#333;margin-right:8px;}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%);color:#333;}
.content{padding:16px;}
.tx-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;position:relative;}
.tx-row{display:flex;align-items:center;margin-bottom:8px;line-height:1.6;}
.tx-row:last-child{margin-bottom:0;}
.tx-label{font-size:14px;color:#999;min-width:72px;flex-shrink:0;}
.tx-value{font-size:14px;color:#333;flex:1;display:flex;align-items:center;gap:4px;}
.tx-tip{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;color:#E6A700;text-align:right;max-width:120px;line-height:1.4;}
</style></head>
<body>
<div class="nav"><span class="arrow">‹</span><span class="nav-title">交易明细</span></div>
<div class="content">
  <div class="tx-card">
    <div class="tx-row"><span class="tx-label">订单编号:</span><span class="tx-value">WD20260718153022001</span></div>
    <div class="tx-row"><span class="tx-label">交易类型:</span><span class="tx-value">余额提现</span></div>
    <div class="tx-row"><span class="tx-label">交易金额:</span><span class="tx-value">10.00元</span></div>
    <div class="tx-row"><span class="tx-label">交易时间:</span><span class="tx-value">2026-07-18 15:30:22</span></div>
  </div>
  <div class="tx-card">
    <div class="tx-tip">预计1-3个工作日到账<br>请耐心等待…<br>超时请联系客服</div>
    <div class="tx-row"><span class="tx-label">订单编号:</span><span class="tx-value">WD20260718201508002</span></div>
    <div class="tx-row"><span class="tx-label">交易类型:</span><span class="tx-value">余额提现</span></div>
    <div class="tx-row"><span class="tx-label">交易金额:</span><span class="tx-value">5.00元</span></div>
    <div class="tx-row"><span class="tx-label">交易时间:</span><span class="tx-value">2026-07-18 20:15:08</span></div>
  </div>
  <div class="tx-card">
    <div class="tx-row"><span class="tx-label">订单编号:</span><span class="tx-value">SP20260717100533003</span></div>
    <div class="tx-row"><span class="tx-label">交易类型:</span><span class="tx-value">存包收入</span></div>
    <div class="tx-row"><span class="tx-label">交易金额:</span><span class="tx-value">2.00元</span></div>
    <div class="tx-row"><span class="tx-label">交易时间:</span><span class="tx-value">2026-07-17 10:05:33</span></div>
  </div>
</div>
</body></html>
