<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>小程序 - 提现进度 预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#333;min-height:100vh;max-width:500px;margin:0 auto}
.nav{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:relative}
.nav-back{cursor:pointer;text-decoration:none;display:flex;align-items:center}
.nav-back svg{width:20px;height:20px;fill:#333}
.nav-title{font-size:17px;font-weight:500;position:absolute;left:50%;transform:translateX(-50%)}
.clock{text-align:center;padding:24px 0 16px}
.clock-circle{width:56px;height:56px;border-radius:50%;border:3px solid #4ECDC4;background:#E8F8F7;position:relative;margin:0 auto}
.clock-hand-v{position:absolute;left:50%;top:12px;width:2px;height:16px;background:#4ECDC4;transform:translateX(-50%)}
.clock-hand-h{position:absolute;left:50%;top:50%;width:10px;height:2px;background:#4ECDC4;transform-origin:left center;transform:translateY(-50%) rotate(30deg)}
.card{background:#fff;border-radius:12px;margin:0 16px;padding:24px 20px;box-shadow:0 1px 6px rgba(0,0,0,0.04)}
.amount{text-align:center;font-size:28px;font-weight:bold;margin-bottom:16px}
.step{display:flex;align-items:flex-start;margin-bottom:18px;position:relative;padding-left:8px}
.step:last-of-type{margin-bottom:0}
.step-dot{width:12px;height:12px;border-radius:50%;margin-right:12px;flex-shrink:0;margin-top:2px}
.step-dot.done{background:#4ECDC4}
.step-dot.current{background:#4ECDC4;animation:pulse 1.5s ease-in-out infinite}
.step-dot.pending{background:#E0E0E0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(78,205,196,0.5)}50%{box-shadow:0 0 0 8px rgba(78,205,196,0)}}
.step-line{position:absolute;left:13px;top:14px;width:2px;height:calc(100% + 6px);background:#E8E8E8}
.step.done .step-line{background:#4ECDC4}
.step:last-of-type .step-line{display:none}
.step-info{flex:1}
.step-title{font-size:14px;font-weight:500}
.step-desc{font-size:12px;color:#999;margin-top:2px;display:flex;align-items:center;gap:4px}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(78,205,196,0.3);border-top-color:#4ECDC4;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.details{margin-top:20px;padding-top:16px;border-top:1px solid #f0f0f0}
.detail-row{display:flex;justify-content:space-between;margin-bottom:10px;font-size:13px}
.detail-label{color:#999}
.detail-value{color:#333}
.submit-btn{display:block;width:calc(100% - 32px);margin:24px 16px 0;background:transparent;color:#666;font-size:14px;padding:10px;border-radius:24px;border:1px solid #ddd;cursor:pointer;text-align:center;text-decoration:none}
.confirm-btn{display:block;width:calc(100% - 32px);margin:16px 16px 32px;background:linear-gradient(135deg,#4ECDC4,#3DB8B0);color:#fff;font-size:16px;font-weight:600;padding:14px;border-radius:24px;border:none;cursor:pointer;text-align:center;text-decoration:none}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-back"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></a>
  <div class="nav-title">提现进度</div>
</div>
<div class="clock">
  <div class="clock-circle">
    <div class="clock-hand-v"></div>
    <div class="clock-hand-h"></div>
  </div>
</div>
<div class="card">
  <div class="amount">¥ 1.00</div>
  <div class="step done"><div class="step-dot done"></div><div class="step-line"></div><div class="step-info"><div class="step-title">申请提现</div><div class="step-desc">已将退款申请提交至微信</div></div></div>
  <div class="step"><div class="step-dot current"></div><div class="step-line"></div><div class="step-info"><div class="step-title">微信处理中</div><div class="step-desc"><span class="spinner"></span> 微信将退款原路退回支付账户</div></div></div>
  <div class="step"><div class="step-dot pending"></div><div class="step-info"><div class="step-title">提现成功</div><div class="step-desc">预计1-3个工作日内到账<br>请耐心等待，超时请联系客服</div></div></div>
  <div class="details">
    <div class="detail-row"><span class="detail-label">提现时间:</span><span class="detail-value">2026-07-19 00:48:00</span></div>
    <div class="detail-row"><span class="detail-label">手机号:</span><span class="detail-value">136****8419</span></div>
    <div class="detail-row"><span class="detail-label">退款至:</span><span class="detail-value">退回原支付账户</span></div>
  </div>
</div>
<a class="submit-btn">查看提现记录</a>
<a class="confirm-btn">确认</a>
</body>
</html>
